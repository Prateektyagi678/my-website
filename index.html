<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ServiceNow OpenFrame Test Adapter (No Cisco)</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; }
    h2 { margin: 0 0 8px; }
    .hint { font-size: 12px; color: #555; margin: 6px 0 12px; }
    label { display:block; margin-top: 10px; font-weight: 600; }
    input, textarea, button { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    textarea { height: 140px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    button { cursor: pointer; }
